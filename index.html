<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Checklist</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            background-color: #f8f9fa;
            color: #333;
        }
        h2 {
            color: #0078D4;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #444;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            background: white;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #0078D4;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: #0078D4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover {
            background: #005A9E;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h2>Modern Checklist</h2>

    <div class="form-group">
        <label for="date">DATE</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label for="id">ID (4 Digits: 1000 - 9999)</label>
        <input 
            type="number" 
            id="id" 
            placeholder="e.g. 1234"
            oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);"
        >
    </div>

    <div class="form-group">
        <label for="name">NAME</label>
        <input type="text" id="name" placeholder="Enter name">
    </div>

    <div class="form-group">
        <label for="group">GROUP</label>
        <input type="text" id="group">
    </div>

    <div class="form-group">
        <label for="pmNo">PM NO</label>
        <input type="text" id="pmNo">
    </div>

    <div class="form-group">
        <label for="trailerNo">TRAILER NO</label>
        <input type="text" id="trailerNo">
    </div>

    <div class="form-group">
        <label for="remark">REMARK</label>
        <textarea id="remark"></textarea>
    </div>

    <div class="form-group">
        <label for="details">DETAILS</label>
        <textarea id="details"></textarea>
    </div>

    <button id="sendBtn" onclick="sendData()">SEND</button>

    <script>
        async function sendData() {
            const date = document.getElementById("date").value.trim();
            const idInput = document.getElementById("id").value.trim();
            const name = document.getElementById("name").value.trim();
            const group = document.getElementById("group").value.trim();
            const pmNo = document.getElementById("pmNo").value.trim();
            const trailerNo = document.getElementById("trailerNo").value.trim();
            const remark = document.getElementById("remark").value.trim();
            const details = document.getElementById("details").value.trim();
            const sendBtn = document.getElementById("sendBtn");

            // 1. Check basic required fields
            if (date === "" || idInput === "" || name === "") {
                alert("Please complete DATE, ID and NAME.");
                return;
            }

            // 2. Validate ID strictly between 1000 and 9999 and exactly 4 digits
            const idNumber = parseInt(idInput, 10);
            if (isNaN(idNumber) || idNumber < 1000 || idNumber > 9999 || idInput.length !== 4) {
                alert("Invalid ID! The ID must be a 4-digit number between 1000 and 9999.");
                return;
            }

            const data = {
                date: date,
                id: idNumber.toString(),
                name: name,
                group: group,
                pmNo: pmNo,
                trailerNo: trailerNo,
                remark: remark,
                details: details
            };

            sendBtn.disabled = true;
            sendBtn.innerText = "SENDING...";

            try {
                const response = await fetch(
                    "https://default227dccee4218411f91e74dabddf0f5.f8.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/08/workflows/d7ac73d3d7d7423eb077a2895b0738df/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=OLDn8ig2sbXDzxKke7ijuD4cLHTaQS-3v2oVkSIDrMw",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(data)
                    }
                );

                if (response.ok) {
                    alert("Data successfully sent!");
                } else {
                    alert("Failed to send data. Server returned an error.");
                }
            } catch (error) {
                console.error("Error sending data:", error);
                alert("Network error. Could not connect to the database.");
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "SEND";
            }
        }
    </script>
</body>
</html>
